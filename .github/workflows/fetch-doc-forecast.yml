name: Fetch DOC Procurement Forecast

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-doc-forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Camoufox browser binary + GeoIP DB
        run: python -m camoufox fetch

      - id: fetch
        name: Fetch DOC forecast
        run: python scripts/fetch_doc_forecast.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        env:
          FILES: ${{ steps.fetch.outputs.filenames }}
          SRC_MOD: ${{ steps.fetch.outputs.source_last_modified }}
          XLSX_MOD: ${{ steps.fetch.outputs.xlsx_modified }}
          DIFF_SUMMARY: ${{ steps.fetch.outputs.diff_summary }}
          ARCHIVE_DATE: ${{ steps.fetch.outputs.archive_date }}
        run: |
          if [[ -z "$(git status --porcelain current/ archive/)" ]]; then
            echo "Script reported changed=true but git sees no diff. Skipping commit."
            exit 0
          fi
          git config user.email "forecast-bot@users.noreply.github.com"
          git config user.name "Forecast Bot"
          git add current/ archive/
          {
            echo "DOC procurement forecast updated — $ARCHIVE_DATE"
            echo
            echo "Source page:        https://www.commerce.gov/oam/industry/procurement-forecasts"
            echo "Files:              $FILES"
            echo "HTTP Last-Modified: ${SRC_MOD:-(none)}"
            echo "XLSX dcterms:mod:   ${XLSX_MOD:-(none)}"
            if [[ -n "$DIFF_SUMMARY" ]]; then
              echo "Diff:               $DIFF_SUMMARY"
              echo
              echo "See archive/$ARCHIVE_DATE/changes.md for row-level changes."
            else
              echo
              echo "Initial snapshot — no prior version to diff against."
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push

      - name: No-change summary
        if: steps.fetch.outputs.changed == 'false'
        run: |
          echo "No content change detected. Files: ${{ steps.fetch.outputs.filenames }}"
          echo "Source HTTP Last-Modified: ${{ steps.fetch.outputs.source_last_modified }}"
          echo "XLSX dcterms:modified:     ${{ steps.fetch.outputs.xlsx_modified }}"

      - name: Upload page snapshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: page-snapshot
          path: current/_*snapshot*.html
          if-no-files-found: ignore
          retention-days: 14
