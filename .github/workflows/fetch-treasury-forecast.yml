name: Fetch Treasury Procurement Forecast

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-treasury-forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Camoufox binary from cache
        id: camoufox-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-v1

      - name: Fetch Camoufox browser binary + GeoIP DB (if not cached)
        if: steps.camoufox-cache.outputs.cache-hit != 'true'
        run: |
          # Retry up to 5 times with 60s backoff on transient failures
          # (GitHub API rate limit hits when DOC + Treasury fire concurrently).
          for attempt in 1 2 3 4 5; do
            if python -m camoufox fetch; then
              break
            fi
            echo "::warning::camoufox fetch attempt $attempt failed; sleeping 60s"
            if [ $attempt -lt 5 ]; then sleep 60; else exit 1; fi
          done

      - id: fetch
        name: Fetch Treasury forecast
        run: python scripts/fetch_treasury_forecast.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        env:
          FILE: ${{ steps.fetch.outputs.filenames }}
          DIFF_SUMMARY: ${{ steps.fetch.outputs.diff_summary }}
          ARCHIVE_DATE: ${{ steps.fetch.outputs.archive_date }}
          RECORD_COUNT: ${{ steps.fetch.outputs.record_count }}
        run: |
          if [[ -z "$(git status --porcelain current/treasury archive/treasury)" ]]; then
            echo "Script reported changed=true but git sees no diff. Skipping."
            exit 0
          fi
          git config user.email "forecast-bot@users.noreply.github.com"
          git config user.name "Forecast Bot"
          git add current/treasury archive/treasury
          {
            echo "Treasury procurement forecast updated — $ARCHIVE_DATE"
            echo
            echo "Source page:  https://osdbu.forecast.treasury.gov/"
            echo "File:         $FILE"
            echo "Records:      $RECORD_COUNT"
            if [[ -n "$DIFF_SUMMARY" ]]; then
              echo "Diff:         $DIFF_SUMMARY"
              echo
              echo "See archive/treasury/$ARCHIVE_DATE/changes.md for row-level changes."
            else
              echo
              echo "Initial snapshot — no prior version to diff against."
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push

      - name: No-change summary
        if: steps.fetch.outputs.changed == 'false'
        run: |
          echo "No content change. Records: ${{ steps.fetch.outputs.record_count }}"
