name: Fetch SAM.gov Forecast-Stage Opportunities

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-sam-forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests

      - id: fetch
        name: Fetch SAM.gov opportunities
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
        run: python scripts/fetch_sam_forecast.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        env:
          DIFF_SUMMARY: ${{ steps.fetch.outputs.diff_summary }}
          ARCHIVE_DATE: ${{ steps.fetch.outputs.archive_date }}
          RECORD_COUNT: ${{ steps.fetch.outputs.record_count }}
        run: |
          if [[ -z "$(git status --porcelain current/sam archive/sam)" ]]; then
            echo "Script reported changed=true but git sees no diff. Skipping."
            exit 0
          fi
          git config user.email "forecast-bot@users.noreply.github.com"
          git config user.name "Forecast Bot"
          git add current/sam archive/sam
          {
            echo "SAM.gov forecast-stage opportunities updated — $ARCHIVE_DATE"
            echo
            echo "Source:        SAM.gov Opportunities API v2"
            echo "Filter:        ptype=p (Presolicitation only), active=true"
            echo "Records:       $RECORD_COUNT"
            if [[ -n "$DIFF_SUMMARY" ]]; then
              echo "Diff:          $DIFF_SUMMARY"
              echo
              echo "See archive/sam/$ARCHIVE_DATE/changes.md for row-level changes."
            else
              echo
              echo "Initial snapshot — no prior version to diff against."
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push

      - name: No-change summary
        if: steps.fetch.outputs.changed == 'false'
        run: |
          echo "No content change. Records: ${{ steps.fetch.outputs.record_count }}"
