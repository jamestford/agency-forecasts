name: Fetch ED Procurement Forecast

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-ed-forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber

      - id: fetch
        name: Fetch ED forecast
        run: python scripts/fetch_ed_forecast.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        env:
          FILE: ${{ steps.fetch.outputs.filenames }}
          SRC_MOD: ${{ steps.fetch.outputs.source_last_modified }}
          DIFF_SUMMARY: ${{ steps.fetch.outputs.diff_summary }}
          ARCHIVE_DATE: ${{ steps.fetch.outputs.archive_date }}
        run: |
          if [[ -z "$(git status --porcelain current/ed archive/ed)" ]]; then
            echo "Script reported changed=true but git sees no diff. Skipping commit."
            exit 0
          fi
          git config user.email "forecast-bot@users.noreply.github.com"
          git config user.name "Forecast Bot"
          git add current/ed archive/ed
          {
            echo "ED procurement forecast updated — $ARCHIVE_DATE"
            echo
            echo "Source page:        https://www.ed.gov/about/doing-business-ed/forecast-of-ed-contract-opportunities"
            echo "File:               $FILE"
            echo "HTTP Last-Modified: ${SRC_MOD:-(none)}"
            if [[ -n "$DIFF_SUMMARY" ]]; then
              echo "Diff:               $DIFF_SUMMARY"
              echo
              echo "See archive/ed/$ARCHIVE_DATE/changes.md for row-level changes."
            else
              echo
              echo "Initial snapshot — no prior version to diff against."
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push

      - name: No-change summary
        if: steps.fetch.outputs.changed == 'false'
        run: |
          echo "No content change detected. File: ${{ steps.fetch.outputs.filenames }}"
          echo "Source HTTP Last-Modified: ${{ steps.fetch.outputs.source_last_modified }}"

      - name: Upload page snapshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ed-page-snapshot
          path: current/ed/_*snapshot*.html
          if-no-files-found: ignore
          retention-days: 14
