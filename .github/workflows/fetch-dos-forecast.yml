name: Fetch DOS Procurement Forecast

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-dos-forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests openpyxl

      - id: fetch
        name: Fetch DOS forecast
        run: python scripts/fetch_dos_forecast.py

      - name: Commit and push if changed
        if: steps.fetch.outputs.changed == 'true'
        env:
          FILE: ${{ steps.fetch.outputs.filenames }}
          SRC_MOD: ${{ steps.fetch.outputs.source_last_modified }}
          DIFF_SUMMARY: ${{ steps.fetch.outputs.diff_summary }}
          ARCHIVE_DATE: ${{ steps.fetch.outputs.archive_date }}
        run: |
          if [[ -z "$(git status --porcelain current/dos archive/dos)" ]]; then
            echo "Script reported changed=true but git sees no diff. Skipping."
            exit 0
          fi
          git config user.email "forecast-bot@users.noreply.github.com"
          git config user.name "Forecast Bot"
          git add current/dos archive/dos
          {
            echo "DOS procurement forecast updated — $ARCHIVE_DATE"
            echo
            echo "Source page:        https://www.state.gov/Procurement-Forecast"
            echo "File:               $FILE"
            echo "HTTP Last-Modified: ${SRC_MOD:-(none)}"
            if [[ -n "$DIFF_SUMMARY" ]]; then
              echo "Diff:               $DIFF_SUMMARY"
              echo
              echo "See archive/dos/$ARCHIVE_DATE/changes.md for row-level changes."
            else
              echo
              echo "Initial snapshot — no prior version to diff against."
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push

      - name: No-change summary
        if: steps.fetch.outputs.changed == 'false'
        run: |
          echo "No content change. File: ${{ steps.fetch.outputs.filenames }}"
          echo "Last-Modified: ${{ steps.fetch.outputs.source_last_modified }}"
